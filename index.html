<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Navbar + Banner</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
}

/* ===== NAVBAR ===== */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  position: absolute;
  width: 100%;
  top: 0;
  z-index: 10;
}

.logo {
  color: white;
  font-size: 22px;
  font-weight: bold;
}

.nav-links {
  list-style: none;
  display: flex;
}

.nav-links li {
  margin-left: 20px;
}

.nav-links a {
  text-decoration: none;
  color: white;
  font-size: 15px;
  transition: 0.3s;
}

.nav-links a:hover {
  color: #f4a261;
}

.menu-toggle {
  display: none;
  font-size: 26px;
  color: white;
  cursor: pointer;
}

/* ===== BANNER ===== */
.banner {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
  position: relative;
  padding: 0 15px;
}

.banner::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  top: 0;
  left: 0;
}

.banner-content {
  position: relative;
  z-index: 1;
  max-width: 600px;
}

.banner h1 {
  font-size: 50px;
}

.banner p {
  font-size: 20px;
  margin: 15px 0;
}

.banner button {
  padding: 12px 25px;
  font-size: 16px;
  border: none;
  background-color: #f4a261;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

/* ===== TABLET ===== */
@media (max-width: 992px) {
  .banner h1 {
    font-size: 40px;
  }

  .banner p {
    font-size: 18px;
  }
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {
  .menu-toggle {
    display: block;
  }

  .nav-links {
    position: absolute;
    top: 60px;
    right: -100%;
    flex-direction: column;
    width: 200px;
    background: rgba(0,0,0,0.9);
    text-align: center;
    transition: 0.3s;
  }

  .nav-links.active {
    right: 0;
  }

  .nav-links li {
    margin: 15px 0;
  }

  .banner h1 {
    font-size: 32px;
  }

  .banner p {
    font-size: 16px;
  }

  .banner button {
    padding: 10px 20px;
    font-size: 14px;
  }
}

/* ===== SMALL MOBILE ===== */
@media (max-width: 480px) {
  .banner h1 {
    font-size: 26px;
  }

  .banner p {
    font-size: 14px;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">MySite</div>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <ul class="nav-links" id="navLinks">
    <li><a href="#">Home</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Services</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>

<!-- BANNER -->
<section class="banner">
  <div class="banner-content">
    <h1>Welcome to My Website</h1>
    <p>Build something amazing today</p>
    <button>Get Started</button>
  </div>
</section>

<script>
function toggleMenu() {
  document.getElementById("navLinks").classList.toggle("active");
}
</script>

</body>
</html>
